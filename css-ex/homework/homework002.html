<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Exercise Challenge</title>
    <link rel="stylesheet" href="homework002.css">
</head>
<body>

    <!-- การ์ดแสดงผลเนื้อหา Depth -->
    <div class="card">
        <h2>Depth</h2>
        <p class="subtitle">Our employment and income outcomes within 3 and 6 months of program completion</p>

        <!-- กล่องสถิติที่ 1 -->
        <div class="stat-box">
            <span class="highlight-green">82%</span>
            <p class="stat-desc">of graduates placed in jobs within six months of program completion (73% at three months)</p>
        </div>

        <!-- กล่องสถิติที่ 2 -->
        <div class="stat-box">
            <span class="highlight-green">$1.5 billion</span>
            <p class="stat-desc">in cumulative wages earned by graduates since 2015</p>
        </div>
    </div>

</body>
</html>
